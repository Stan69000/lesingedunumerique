name: Rebuild Veille

on:
  schedule:
    # 04:00 UTC ~= 06:00 en heure d'ete Europe/Paris
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: rebuild-veille
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website (refresh veille + cache)
        env:
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_TURNSTILE_SITE_KEY }}
          INOREADER_TOKEN: ${{ secrets.INOREADER_TOKEN }}
          INOREADER_ACCESS_TOKEN: ${{ secrets.INOREADER_ACCESS_TOKEN }}
          INOREADER_CLIENT_ID: ${{ secrets.INOREADER_CLIENT_ID }}
          INOREADER_CLIENT_SECRET: ${{ secrets.INOREADER_CLIENT_SECRET }}
          INOREADER_REFRESH_TOKEN: ${{ secrets.INOREADER_REFRESH_TOKEN }}
          INOREADER_OAUTH_TOKEN_URL: ${{ vars.INOREADER_OAUTH_TOKEN_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          VEILLE_ENABLE_ENRICHMENT: "false"
        run: npm run build

      - name: Commit cache if changed
        id: cache_commit
        run: |
          if git diff --quiet -- cache/enriched.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache/enriched.json
          git commit -m "chore(cache): update enriched veille data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy workflow when cache unchanged
        if: steps.cache_commit.outputs.changed == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-o2switch.yml/dispatches" \
            -d '{"ref":"main"}'
